<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flores para ti 🌼</title>

<style>

/* VIDEO FONDO */
#bgVideo{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

/* OSCURECER */
.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.3);
z-index:-1;
}

/* TEXTO INICIAL */
#mensaje{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
background:rgba(255,248,220,0.9);
padding:15px 25px;
border-radius:10px;
font-size:18px;
}

/* FLORES */
.flor{
position:absolute;
cursor:pointer;
animation:caer linear forwards;
z-index:1;
}

@keyframes caer{
from{transform:translateY(-50px);}
to{transform:translateY(100vh);}
}

/* CANASTA */
#canasta{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:rgba(255,248,220,0.9);
padding:10px 20px;
border-radius:10px;
}

/* MENSAJES */
.mensajeFlotante{
position:absolute;
color:#fff;
font-size:14px;
animation:fadeUp 2s ease forwards;
}

@keyframes fadeUp{
0%{opacity:1;}
100%{opacity:0; transform:translateY(-40px);}
}

/* CORAZONES */
.corazon{
position:absolute;
animation:flotar 1.5s ease forwards;
}

@keyframes flotar{
0%{opacity:1;}
100%{opacity:0; transform:translateY(-60px);}
}

/* CARTA */
#carta{
display:none;
position:absolute;
top:25%;
left:50%;
transform:translateX(-50%);
width:80%;
background:rgba(255,248,220,0.95);
padding:20px;
border-radius:12px;
text-align:center;
z-index:10;
}

/* VIDEO FINAL */
#videoFinal{
display:none;
position:absolute;
top:20%;
left:50%;
transform:translateX(-50%);
width:80%;
z-index:11;
}

/* RAMO FINAL */
#ramoFinal{
display:none;
position:absolute;
top:30%;
left:50%;
transform:translateX(-50%);
text-align:center;
color:white;
font-size:22px;
z-index:12;
}

/* MODO FINAL */
.modoFinal .flor{
opacity:0.2;
z-index:0;
animation-duration:10s;
}

</style>
</head>

<body>

<video id="bgVideo" autoplay muted loop playsinline>
<source src="fondo.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<audio id="musica" loop>
<source src="musica.mp3" type="audio/mp3">
</audio>

<div id="mensaje">Toca los tulipanes 🌷</div>
<div id="canasta">🧺 0</div>

<div id="carta">
🌻<br><br>
Vi esta flor y pensé en ti…<br>
porque es bonita.<br><br>

Y bueno… a mí no me gustan tanto las flores 😅<br><br>

Pero esta sí…<br>
porque me recordó a ti.<br><br>

Y tú sí eres bonita.
</div>

<div id="videoFinal">
<video id="miVideo" width="100%" controls>
<source src="video.mp4" type="video/mp4">
</video>
</div>

<div id="ramoFinal">
🌷🌷🌷🌷🌷🌷🌷🌷🌷🌷<br>
🌷🌷🌷🌷🌷🌷🌷🌷🌷🌷<br><br>

Eres aún más hermosa que mil primaveras 🌼<br>
Te amo 💛
</div>

<script>

let tulipanes=0
let musica=document.getElementById("musica")

const mensajes=[
"Quédate un poco más",
"Esto se siente bonito",
"Contigo todo es mejor",
"No quiero que termine",
"Me gustas así"
]

function crearCorazon(x,y){
let c=document.createElement("div")
c.className="corazon"
c.innerHTML="💛"
c.style.left=x+"px"
c.style.top=y+"px"
document.body.appendChild(c)
setTimeout(()=>c.remove(),1500)
}

function mostrarMensaje(texto,x,y){
let m=document.createElement("div")
m.className="mensajeFlotante"
m.innerText=texto
m.style.left=x+"px"
m.style.top=y+"px"
document.body.appendChild(m)
setTimeout(()=>m.remove(),2000)
}

function crearFlor(){
let flor=document.createElement("div")
flor.className="flor"

let esTulipan=Math.random()<0.4
flor.innerHTML= esTulipan 
? '<img src="tulipan.png" width="40">' 
: '🌼'

flor.style.left=Math.random()*100+"vw"
flor.style.animationDuration=5+Math.random()*5+"s"

flor.onclick=function(e){

musica.play()

crearCorazon(e.clientX,e.clientY)

if(esTulipan){
tulipanes++

mostrarMensaje(mensajes[tulipanes%mensajes.length],e.clientX,e.clientY)

document.getElementById("canasta").innerHTML="🧺 "+tulipanes
}
}

document.body.appendChild(flor)
setTimeout(()=>flor.remove(),10000)
}

setInterval(crearFlor,800)

/* TIMELINE */

// carta a los 40s
setTimeout(()=>{
document.getElementById("carta").style.display="block"
document.body.classList.add("modoFinal")
},40000)

// video a los 45s
setTimeout(()=>{
document.getElementById("videoFinal").style.display="block"
musica.volume=0.2
document.getElementById("miVideo").play()
},45000)

// cuando termina video
document.getElementById("miVideo").onended=function(){
setTimeout(()=>{
document.getElementById("videoFinal").style.display="none"
document.getElementById("ramoFinal").style.display="block"
musica.volume=1
},5000)
}

</script>

</body>
</html>
