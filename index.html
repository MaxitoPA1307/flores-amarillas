<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Flores para ti 🌼</title>

<style>

/* FONDO */
#bgVideo{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
z-index:-1;
}

/* TEXTO */
#mensaje{
position:absolute;
top:20px;
left:50%;
transform:translateX(-50%);
background:rgba(255,248,220,0.9);
padding:15px 25px;
border-radius:10px;
}

/* FLORES */
.flor{
position:absolute;
cursor:pointer;
animation:caer linear forwards;
z-index:1;
}

.flor img{
width:60px;
}

@media (max-width:600px){
.flor img{
width:80px;
}
}

@keyframes caer{
from{transform:translateY(-50px);}
to{transform:translateY(100vh);}
}

/* CANASTA */
#canasta{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:rgba(255,248,220,0.9);
padding:10px 20px;
border-radius:10px;
}

/* MENSAJES */
.mensajeFlotante{
position:absolute;
color:#fff;
font-size:16px;
font-weight:bold;
text-shadow:0 0 10px rgba(0,0,0,0.7);
animation:fadeUp 3s ease forwards;
}

@keyframes fadeUp{
0%{opacity:1;}
100%{opacity:0; transform:translateY(-40px);}
}

/* CORAZONES */
.corazon{
position:absolute;
animation:flotar 1.5s ease forwards;
}

@keyframes flotar{
0%{opacity:1;}
100%{opacity:0; transform:translateY(-60px);}
}

/* TRANSICIONES */
.fade{
opacity:0;
transition:opacity 1s ease;
}

.show{
opacity:1;
}

/* BLOQUES */
#carta, #videoFinal, #finalFinal{
display:none;
position:absolute;
left:50%;
transform:translateX(-50%);
width:80%;
max-width:400px;
z-index:10;
}

/* CARTA */
#carta{
top:25%;
background:rgba(255,248,220,0.95);
padding:20px;
border-radius:12px;
text-align:center;
}

/* VIDEO FINAL GRANDE */
#finalFinal{
top:10%;
width:95%;
max-width:500px;
}

/* MODO FINAL */
.modoFinal .flor{
opacity:0.2;
z-index:0;
animation-duration:10s;
}

/* FLORES AL FRENTE FINAL */
.modoFinalTotal .flor{
z-index:20;
opacity:1;
}

</style>
</head>

<body>

<video id="bgVideo" autoplay muted loop playsinline>
<source src="fondo.mp4">
</video>

<div class="overlay"></div>

<audio id="musica" loop>
<source src="musica.mp3">
</audio>

<div id="mensaje">Toca los tulipanes 🌷</div>
<div id="canasta">🧺 0</div>

<div id="carta" class="fade">
🌻<br><br>
Vi esta flor y pensé en ti…<br>
porque es bonita.<br><br>
Y bueno… a mí no me gustan tanto 😅<br><br>
Pero esta sí… porque me recordó a ti.<br><br>
Y tú sí eres bonita.
</div>

<div id="videoFinal" class="fade">
<video id="miVideo" width="100%">
<source src="video.mp4">
</video>
</div>

<div id="finalFinal" class="fade">
<video id="videoFinal2" width="100%" style="border-radius:12px;">
<source src="final.mp4">
</video>
</div>

<script>

let musica=document.getElementById("musica")

let indiceMensaje=0
let indiceFinal=0
let modoFinalActivo=false

const mensajes=[
"Oye…",
"Esto está bonito",
"Me gusta este momento",
"Contigo todo se siente tranquilo",
"No es algo común",
"Pero me gusta",
"Me gusta hablar contigo",
"Más de lo que esperaba",
"Se siente fácil",
"Se siente natural",
"Como si encajara",
"Como si fuera correcto",
"Y eso no pasa siempre",
"Me haces sentir en paz",
"Y eso vale mucho",
"Me gustas…",
"Así, tal cual eres",
"Sin cambiar nada",
"Ni este momento",
"Ni lo que estamos creando",
"Solo quiero seguir aquí",
"Un poco más contigo",
"Y ver hasta dónde llegamos"
]

const mensajesFinales=[
"¿Sigues aquí? 🌷",
"Entonces déjame decirte algo…",
"Me importas mucho",
"Más de lo que imaginaba",
"Me gusta estar contigo",
"Me gusta cómo eres",
"Cómo hablas",
"Cómo piensas",
"Cómo me haces sentir",
"No es algo común",
"Y no lo quiero perder",
"Quiero seguir contigo",
"Aprendiendo de ti",
"Riendo contigo",
"Compartiendo momentos",
"Porque contigo…",
"todo se siente mejor",
"Y no lo cambiaría",
"Por nada",
"Ni por nadie",
"Solo quiero que lo sepas",
"Te amo 💛"
]

function fadeIn(el){
el.style.display="block"
setTimeout(()=>el.classList.add("show"),50)
}

function fadeOut(el){
el.classList.remove("show")
setTimeout(()=>el.style.display="none",1000)
}

function cambiarVolumen(target,duracion){
let paso=0.05
let intervalo=duracion/20

let fade=setInterval(()=>{
if(Math.abs(musica.volume-target)<0.05){
musica.volume=target
clearInterval(fade)
}else{
musica.volume += (target>musica.volume?paso:-paso)
}
},intervalo)
}

function crearCorazon(x,y){
let c=document.createElement("div")
c.className="corazon"
c.innerHTML="💛"
c.style.left=x+"px"
c.style.top=y+"px"
document.body.appendChild(c)
setTimeout(()=>c.remove(),1500)
}

function mostrarMensaje(texto,x,y){
let m=document.createElement("div")
m.className="mensajeFlotante"
m.innerText=texto
m.style.left=x+"px"
m.style.top=y+"px"
document.body.appendChild(m)
setTimeout(()=>m.remove(),3000)
}

function crearFlor(){
let flor=document.createElement("div")
flor.className="flor"

let esTulipan=Math.random()<0.4

flor.innerHTML= esTulipan 
? '<img src="tulipan.png">'
: '🌼'

flor.style.left=Math.random()*100+"vw"
flor.style.animationDuration=8+Math.random()*6+"s"

flor.onclick=function(e){

musica.play()

crearCorazon(e.clientX,e.clientY)

if(esTulipan){

if(!modoFinalActivo){
if(indiceMensaje<mensajes.length){
mostrarMensaje(mensajes[indiceMensaje],e.clientX,e.clientY)
indiceMensaje++
}
}else{
if(indiceFinal<mensajesFinales.length){
mostrarMensaje(mensajesFinales[indiceFinal],e.clientX,e.clientY)
indiceFinal++
}else{
mostrarMensaje("💛",e.clientX,e.clientY)
}
}

}

}

document.body.appendChild(flor)
setTimeout(()=>flor.remove(),12000)
}

setInterval(crearFlor,800)

/* MENSAJES AUTOMÁTICOS */
setInterval(()=>{
if(!modoFinalActivo && indiceMensaje<mensajes.length){
mostrarMensaje(mensajes[indiceMensaje],window.innerWidth/2,window.innerHeight/2)
indiceMensaje++
}
},1700)

/* TIMELINE */

setTimeout(()=>{
document.body.classList.add("modoFinal")
fadeIn(document.getElementById("carta"))
},40000)

setTimeout(()=>{
fadeIn(document.getElementById("videoFinal"))
cambiarVolumen(0.2,2000)
document.getElementById("miVideo").play()
},45000)

document.getElementById("miVideo").onended=function(){

setTimeout(()=>{

fadeOut(document.getElementById("videoFinal"))
fadeIn(document.getElementById("finalFinal"))
cambiarVolumen(1,2000)

let v2=document.getElementById("videoFinal2")
v2.play()

v2.onended=function(){

setTimeout(()=>{
fadeOut(document.getElementById("finalFinal"))
modoFinalActivo=true
document.body.classList.add("modoFinalTotal")
},5000)

}

},5000)

}

</script>

</body>
</html>
