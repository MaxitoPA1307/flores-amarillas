<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Flores para ti 🌼</title>

<style>

/* BASE */
html, body{
margin:0;
padding:0;
overflow:hidden;
height:100dvh;
user-select:none;
-webkit-user-select:none;
-webkit-touch-callout:none;
}

*{
-webkit-tap-highlight-color: transparent;
}

/* FONDO */
#bgVideo{
position:fixed;
width:100%;
height:100%;
object-fit:cover;
z-index:-2;
}

.overlay{
position:fixed;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
z-index:-1;
}

/* TEXTO SUPERIOR */
#mensaje{
position:absolute;
top:3vh;
left:50%;
transform:translateX(-50%);
background:rgba(255,248,220,0.95);
padding:2vh 4vw;
border-radius:12px;
font-size:2.5vh;
text-align:center;
max-width:90%;
}

/* CANASTA */
#canasta{
position:fixed;
bottom:3vh;
left:50%;
transform:translateX(-50%);
background:rgba(255,248,220,0.95);
padding:1.5vh 4vw;
border-radius:12px;
font-size:2.5vh;
}

/* FLORES */
.flor{
position:absolute;
cursor:pointer;
animation:caer linear forwards;
z-index:1;
font-size:14vw;
}

.flor img{
width:18vw;
max-width:120px;
}

/* CAÍDA */
@keyframes caer{
from{transform:translateY(-10vh);}
to{transform:translateY(110vh);}
}

/* MENSAJES */
.mensajeFlotante{
position:absolute;
color:#fff;
font-size:3vh;
font-weight:bold;
text-align:center;
background:rgba(0,0,0,0.6);
padding:8px 12px;
border-radius:10px;
animation:fadeUp 3s ease forwards;
max-width:80%;
z-index:999;
}

@keyframes fadeUp{
0%{opacity:1;}
100%{opacity:0; transform:translateY(-5vh);}
}

/* CORAZONES */
.corazon{
position:absolute;
font-size:4vh;
animation:flotar 1.5s ease forwards;
}

@keyframes flotar{
0%{opacity:1;}
100%{opacity:0; transform:translateY(-6vh);}
}

/* BLOQUES */
#carta, #videoFinal, #finalFinal{
display:none;
position:absolute;
left:50%;
transform:translateX(-50%);
width:90%;
z-index:10;
}

/* CARTA */
#carta{
top:20vh;
background:rgba(255,248,220,0.97);
padding:3vh 4vw;
border-radius:14px;
text-align:center;
font-size:2.5vh;
line-height:1.4;
}

/* VIDEOS */
#videoFinal{ top:15vh; }
#finalFinal{ top:10vh; width:95%; }

video{
width:100%;
border-radius:12px;
}

/* MODO FINAL */
.modoFinal .flor{
opacity:0.3;
z-index:0;
animation-duration:12s;
}

.modoFinalTotal .flor{
z-index:20;
opacity:1;
}

/* MENSAJE FINAL */
#mensajeFinalGrande{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
font-size:8vh;
color:#fff;
background:rgba(0,0,0,0.7);
padding:20px 30px;
border-radius:20px;
text-align:center;
z-index:1000;
animation:latido 0.8s infinite alternate, fadeFinal 4s ease forwards;
}

/* LATIDO */
@keyframes latido{
from{transform:translate(-50%,-50%) scale(1);}
to{transform:translate(-50%,-50%) scale(1.1);}
}

/* DESVANECIDO */
@keyframes fadeFinal{
0%{opacity:0;}
20%{opacity:1;}
80%{opacity:1;}
100%{opacity:0;}
}

</style>
</head>

<body>

<video id="bgVideo" autoplay muted loop playsinline>
<source src="fondo.mp4">
</video>

<div class="overlay"></div>

<audio id="musica" loop>
<source src="musica.mp3">
</audio>

<div id="mensaje">Toca los tulipanes 🌷</div>
<div id="canasta">🧺 0</div>

<div id="carta">
🌻<br><br>
Vi esta flor y pensé en ti…<br>
porque es bonita.<br><br>
Y bueno… a mí no me gustan tanto 😅<br><br>
Pero esta sí… porque me recordó a ti.<br><br>
Y tú sí eres bonita.
</div>

<div id="videoFinal">
<video id="miVideo">
<source src="video.mp4">
</video>
</div>

<div id="finalFinal">
<video id="videoFinal2">
<source src="final.mp4">
</video>
</div>

<script>

let musica=document.getElementById("musica")

let indiceMensaje=0
let indiceFinal=0
let modoFinalActivo=false

const mensajes=[
"Oye…","Esto está bonito","Me gusta este momento",
"Contigo todo se siente tranquilo","Pero me gusta",
"Más de lo que esperaba","Se siente natural",
"Me haces sentir en paz","Me gustas…",
"Así, tal cual eres","Solo quiero seguir aquí"
]

const mensajesFinales=[
"¿Sigues aquí? 🌷","Me importas mucho",
"Me gusta estar contigo","Cómo me haces sentir",
"No quiero perder esto","Quiero seguir contigo",
"Porque contigo…","todo se siente mejor"
]

function fadeIn(el){
el.style.display="block"
}

function fadeOut(el){
el.style.display="none"
}

function cambiarVolumen(target,duracion){
let paso=0.05
let intervalo=duracion/20

let fade=setInterval(()=>{
if(Math.abs(musica.volume-target)<0.05){
musica.volume=target
clearInterval(fade)
}else{
musica.volume += (target>musica.volume?paso:-paso)
}
},intervalo)
}

function crearCorazon(x,y){
let c=document.createElement("div")
c.className="corazon"
c.innerHTML="💛"
c.style.left=x+"px"
c.style.top=y+"px"
document.body.appendChild(c)
setTimeout(()=>c.remove(),1500)
}

function mostrarMensaje(texto,x,y){
let m=document.createElement("div")
m.className="mensajeFlotante"
m.innerText=texto
m.style.left=x+"px"
m.style.top=y+"px"
document.body.appendChild(m)
setTimeout(()=>m.remove(),3000)
}

function crearFlor(){
let flor=document.createElement("div")
flor.className="flor"

let esTulipan=Math.random()<0.4

flor.innerHTML= esTulipan 
? '<img src="tulipan.png">'
: '🌼'

flor.style.left=Math.random()*100+"vw"
flor.style.animationDuration=8+Math.random()*6+"s"

flor.onclick=function(e){

musica.play()
crearCorazon(e.clientX,e.clientY)

if(esTulipan){

if(!modoFinalActivo){
if(indiceMensaje<mensajes.length){
mostrarMensaje(mensajes[indiceMensaje],e.clientX,e.clientY)
indiceMensaje++
}
}else{
if(indiceFinal<mensajesFinales.length){
mostrarMensaje(mensajesFinales[indiceFinal],e.clientX,e.clientY)
indiceFinal++
}else{

let final=document.createElement("div")
final.id="mensajeFinalGrande"
final.innerText="Te Amo 💛"

document.body.appendChild(final)
setTimeout(()=>final.remove(),4000)

}

}

}

}

document.body.appendChild(flor)
setTimeout(()=>flor.remove(),12000)
}

setInterval(crearFlor,800)

/* TIMELINE */

setTimeout(()=>{
document.body.classList.add("modoFinal")
fadeIn(document.getElementById("carta"))
},40000)

setTimeout(()=>{
fadeIn(document.getElementById("videoFinal"))
cambiarVolumen(0.2,1500)
document.getElementById("miVideo").play()
},45000)

document.getElementById("miVideo").onended=function(){

fadeOut(document.getElementById("videoFinal"))
fadeIn(document.getElementById("finalFinal"))

let v2=document.getElementById("videoFinal2")
cambiarVolumen(1,1500)
v2.play()

v2.onended=function(){

fadeOut(document.getElementById("finalFinal"))
modoFinalActivo=true
document.body.classList.add("modoFinalTotal")

}

}

</script>

</body>
</html>
